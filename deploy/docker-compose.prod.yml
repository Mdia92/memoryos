# Production stack for a single Alibaba Cloud ECS instance.
# The database is ApsaraDB RDS for PostgreSQL (managed) — set DATABASE_URL.
#
#   docker compose -f deploy/docker-compose.prod.yml --env-file .env up -d --build

services:
  backend:
    build:
      context: ..
      dockerfile: deploy/Dockerfile.backend
    environment:
      DATABASE_URL: ${DATABASE_URL}
      DASHSCOPE_API_KEY: ${DASHSCOPE_API_KEY}
      DASHSCOPE_BASE_URL: ${DASHSCOPE_BASE_URL:-https://dashscope-intl.aliyuncs.com/compatible-mode/v1}
      CORS_ORIGINS: ${CORS_ORIGINS:-http://localhost}
    restart: unless-stopped

  frontend:
    build:
      context: ..
      dockerfile: deploy/Dockerfile.frontend
      args:
        NEXT_PUBLIC_API_URL: ""
    restart: unless-stopped

  nginx:
    image: nginx:alpine
    ports:
      - "80:80"
    volumes:
      - ./nginx.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      - backend
      - frontend
    restart: unless-stopped
