# Production stack — self-contained (includes Postgres).
# Works on Alibaba Cloud ECS or any Docker host.
#
#   cp .env.example .env   # set DASHSCOPE_API_KEY
#   docker compose -f deploy/docker-compose.prod.yml --env-file .env up -d --build

services:
  db:
    image: pgvector/pgvector:pg16
    environment:
      POSTGRES_USER: memoryos
      POSTGRES_PASSWORD: memoryos
      POSTGRES_DB: memoryos
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U memoryos"]
      interval: 5s
      timeout: 3s
      retries: 10

  backend:
    build:
      context: ..
      dockerfile: deploy/Dockerfile.backend
    environment:
      DATABASE_URL: postgresql+asyncpg://memoryos:memoryos@db:5432/memoryos
      DASHSCOPE_API_KEY: ${DASHSCOPE_API_KEY:-}
      DASHSCOPE_BASE_URL: ${DASHSCOPE_BASE_URL:-https://dashscope-intl.aliyuncs.com/compatible-mode/v1}
      CORS_ORIGINS: ${CORS_ORIGINS:-http://localhost}
    depends_on:
      db:
        condition: service_healthy
    restart: unless-stopped

  frontend:
    build:
      context: ..
      dockerfile: deploy/Dockerfile.frontend
      args:
        NEXT_PUBLIC_API_URL: ""
    restart: unless-stopped

  nginx:
    image: nginx:alpine
    ports:
      - "80:80"
    volumes:
      - ./nginx.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      - backend
      - frontend
    restart: unless-stopped

volumes:
  pgdata:
