# nginx reverse proxy for MemoryOS.
#
# Fronts:
#   /api, /health, /docs, /openapi.json  → FastAPI backend
#   /longmemeval-results.json (and other Next.js assets) → frontend
#   everything else                     → Next.js dashboard
#
# SSE (/api/stream) must not be buffered or cached — those endpoints are
# handled by the same backend location; both proxy_buffering and
# proxy_cache are off there.

# gzip everything that compresses well (Next.js chunks, JSON API responses).
gzip on;
gzip_vary on;
gzip_min_length 1024;
gzip_proxied any;
gzip_comp_level 6;
gzip_types
    text/plain
    text/css
    text/javascript
    application/javascript
    application/json
    application/xml
    image/svg+xml
    application/manifest+json;

server {
    listen 80;
    server_name _;

    # Same-origin API from the browser's point of view; no CORS gymnastics needed.
    client_max_body_size 8m;

    # Basic security headers. TLS termination adds HSTS at the LB layer.
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    add_header Permissions-Policy "geolocation=(), microphone=(), camera=()" always;

    # Backend API (SSE needs buffering off; keep the timeout very long for /api/stream).
    location ~ ^/(api|health|docs|openapi.json) {
        proxy_pass http://backend:8000;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_buffering off;
        proxy_cache off;
        proxy_read_timeout 3600s;
    }

    # Cache Next.js static chunks aggressively — they're hashed, so safe to freeze.
    location /_next/static/ {
        proxy_pass http://frontend:3002;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        expires 1y;
        add_header Cache-Control "public, immutable" always;
    }

    # Everything else: Next.js dashboard (SSR + client bundles + JSON files).
    location / {
        proxy_pass http://frontend:3002;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
}
