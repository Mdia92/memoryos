services:
  db:
    image: pgvector/pgvector:pg16
    container_name: memoryos-db
    environment:
      POSTGRES_USER: memoryos
      POSTGRES_PASSWORD: memoryos
      POSTGRES_DB: memoryos
    ports:
      - "5433:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U memoryos"]
      interval: 5s
      timeout: 3s
      retries: 10

volumes:
  pgdata:
