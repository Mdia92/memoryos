<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 980 640" font-family="Segoe UI, Helvetica, Arial, sans-serif">
  <defs>
    <marker id="arrow" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#8b94a7"/>
    </marker>
    <marker id="arrowg" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#10b981"/>
    </marker>
  </defs>

  <rect width="980" height="640" fill="#0b0e14"/>
  <text x="30" y="40" fill="#e7ebf2" font-size="20" font-weight="700">MemoryOS — evidence-based memory agent</text>
  <text x="30" y="62" fill="#8b94a7" font-size="12">Every stored fact carries its source, its confidence, and its lineage.</text>

  <!-- Alibaba Cloud boundary -->
  <rect x="270" y="90" width="680" height="520" rx="14" fill="none" stroke="#ff6a00" stroke-width="1.5" stroke-dasharray="6 5"/>
  <text x="290" y="114" fill="#ff6a00" font-size="13" font-weight="700">Alibaba Cloud</text>

  <!-- Browser / dashboard -->
  <rect x="30" y="150" width="200" height="150" rx="10" fill="#11151d" stroke="#232a37"/>
  <text x="130" y="178" fill="#e7ebf2" font-size="14" font-weight="600" text-anchor="middle">Dashboard</text>
  <text x="130" y="198" fill="#8b94a7" font-size="11" text-anchor="middle">Next.js + Recharts</text>
  <text x="130" y="222" fill="#8b94a7" font-size="11" text-anchor="middle">accuracy curve · memory browser</text>
  <text x="130" y="238" fill="#8b94a7" font-size="11" text-anchor="middle">auditor feed · ask panel</text>
  <text x="130" y="262" fill="#60a5fa" font-size="11" text-anchor="middle">live SSE notifications</text>

  <!-- ECS box -->
  <rect x="300" y="140" width="420" height="360" rx="12" fill="#10141b" stroke="#33405a"/>
  <text x="320" y="166" fill="#e7ebf2" font-size="13" font-weight="700">FastAPI backend</text>
  <text x="530" y="166" fill="#8b94a7" font-size="11">Elastic Compute Service (ECS), Docker</text>

  <!-- Fast path -->
  <rect x="320" y="185" width="230" height="290" rx="10" fill="#11151d" stroke="#10b981"/>
  <text x="435" y="209" fill="#10b981" font-size="12" font-weight="700" text-anchor="middle">FAST PATH · deterministic · ~80%</text>
  <rect x="335" y="222" width="200" height="34" rx="6" fill="#161b25" stroke="#232a37"/>
  <text x="435" y="243" fill="#e7ebf2" font-size="11" text-anchor="middle">1 · Episodic — events + provenance</text>
  <rect x="335" y="262" width="200" height="34" rx="6" fill="#161b25" stroke="#232a37"/>
  <text x="435" y="283" fill="#e7ebf2" font-size="11" text-anchor="middle">2 · Semantic — merge + corroborate</text>
  <rect x="335" y="302" width="200" height="34" rx="6" fill="#161b25" stroke="#232a37"/>
  <text x="435" y="323" fill="#e7ebf2" font-size="11" text-anchor="middle">3 · Pattern — promoted by evidence</text>
  <rect x="335" y="342" width="200" height="34" rx="6" fill="#161b25" stroke="#232a37"/>
  <text x="435" y="363" fill="#e7ebf2" font-size="11" text-anchor="middle">4 · Decay — half-life by sources</text>
  <rect x="335" y="386" width="200" height="38" rx="6" fill="#1a1420" stroke="#f87171"/>
  <text x="435" y="402" fill="#f87171" font-size="11" font-weight="700" text-anchor="middle">Evidence Auditor</text>
  <text x="435" y="416" fill="#8b94a7" font-size="10" text-anchor="middle">contradictions · noise vs change</text>
  <rect x="335" y="430" width="200" height="34" rx="6" fill="#161b25" stroke="#232a37"/>
  <text x="435" y="446" fill="#e7ebf2" font-size="11" text-anchor="middle">Verifier + confidence gates</text>
  <text x="435" y="459" fill="#8b94a7" font-size="10" text-anchor="middle">act ≥ .80 · show ≥ .40 · else ask</text>

  <!-- Slow path -->
  <rect x="570" y="185" width="130" height="290" rx="10" fill="#11151d" stroke="#a78bfa"/>
  <text x="635" y="209" fill="#a78bfa" font-size="12" font-weight="700" text-anchor="middle">SLOW PATH</text>
  <text x="635" y="224" fill="#8b94a7" font-size="10" text-anchor="middle">Qwen · ~20%</text>
  <text x="635" y="252" fill="#e7ebf2" font-size="11" text-anchor="middle">assertion</text>
  <text x="635" y="266" fill="#e7ebf2" font-size="11" text-anchor="middle">extraction</text>
  <text x="635" y="294" fill="#e7ebf2" font-size="11" text-anchor="middle">question → key</text>
  <text x="635" y="322" fill="#e7ebf2" font-size="11" text-anchor="middle">sourced answers</text>
  <text x="635" y="350" fill="#e7ebf2" font-size="11" text-anchor="middle">pattern wording</text>
  <line x1="585" y1="372" x2="685" y2="372" stroke="#232a37"/>
  <text x="635" y="394" fill="#fbbf24" font-size="10" font-weight="700" text-anchor="middle">fallback chain</text>
  <text x="635" y="410" fill="#8b94a7" font-size="10" text-anchor="middle">qwen-plus</text>
  <text x="635" y="424" fill="#8b94a7" font-size="10" text-anchor="middle">↓ qwen-turbo</text>
  <text x="635" y="438" fill="#8b94a7" font-size="10" text-anchor="middle">↓ rules-only</text>
  <text x="635" y="458" fill="#8b94a7" font-size="9" text-anchor="middle">(never invents; defers)</text>

  <!-- Model Studio -->
  <rect x="750" y="185" width="180" height="120" rx="10" fill="#11151d" stroke="#ff6a00"/>
  <text x="840" y="212" fill="#e7ebf2" font-size="13" font-weight="600" text-anchor="middle">Model Studio</text>
  <text x="840" y="232" fill="#8b94a7" font-size="11" text-anchor="middle">DashScope OpenAI-</text>
  <text x="840" y="246" fill="#8b94a7" font-size="11" text-anchor="middle">compatible endpoint</text>
  <text x="840" y="270" fill="#a78bfa" font-size="11" text-anchor="middle">qwen-plus · qwen-turbo</text>
  <text x="840" y="288" fill="#a78bfa" font-size="11" text-anchor="middle">text-embedding-v3</text>

  <!-- RDS -->
  <rect x="750" y="350" width="180" height="125" rx="10" fill="#11151d" stroke="#60a5fa"/>
  <text x="840" y="377" fill="#e7ebf2" font-size="13" font-weight="600" text-anchor="middle">ApsaraDB RDS</text>
  <text x="840" y="395" fill="#8b94a7" font-size="11" text-anchor="middle">PostgreSQL + pgvector</text>
  <text x="840" y="419" fill="#8b94a7" font-size="10" text-anchor="middle">events · facts · patterns</text>
  <text x="840" y="433" fill="#8b94a7" font-size="10" text-anchor="middle">contradictions · audit_log</text>
  <text x="840" y="447" fill="#8b94a7" font-size="10" text-anchor="middle">eval_runs</text>

  <!-- Eval harness -->
  <rect x="300" y="520" width="420" height="70" rx="10" fill="#11151d" stroke="#fbbf24"/>
  <text x="510" y="546" fill="#fbbf24" font-size="12" font-weight="700" text-anchor="middle">Eval harness — seeded, deterministic, zero-LLM</text>
  <text x="510" y="566" fill="#8b94a7" font-size="11" text-anchor="middle">12 decision tasks × 20 sessions vs last-wins baseline → accuracy curve</text>

  <!-- Arrows -->
  <line x1="230" y1="200" x2="300" y2="200" stroke="#8b94a7" stroke-width="1.5" marker-end="url(#arrow)"/>
  <text x="265" y="192" fill="#8b94a7" font-size="10" text-anchor="middle">HTTP</text>
  <line x1="300" y1="250" x2="230" y2="250" stroke="#10b981" stroke-width="1.5" marker-end="url(#arrowg)"/>
  <text x="265" y="268" fill="#10b981" font-size="10" text-anchor="middle">SSE</text>
  <line x1="700" y1="245" x2="750" y2="245" stroke="#8b94a7" stroke-width="1.5" marker-end="url(#arrow)"/>
  <line x1="720" y1="410" x2="750" y2="410" stroke="#8b94a7" stroke-width="1.5" marker-end="url(#arrow)"/>
  <line x1="510" y1="500" x2="510" y2="520" stroke="#8b94a7" stroke-width="1.5" marker-end="url(#arrow)"/>
</svg>
