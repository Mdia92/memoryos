<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1040 720" font-family="Segoe UI, Helvetica, Arial, sans-serif">
  <defs>
    <marker id="arrow" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#8b94a7"/>
    </marker>
    <marker id="arrowg" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#10b981"/>
    </marker>
    <marker id="arrowp" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#a78bfa"/>
    </marker>
  </defs>

  <rect width="1040" height="720" fill="#0b0e14"/>
  <text x="30" y="40" fill="#e7ebf2" font-size="20" font-weight="700">MemoryOS — evidence-based memory agent</text>
  <text x="30" y="62" fill="#8b94a7" font-size="12">Every stored fact carries its source, its confidence, and its lineage.</text>

  <!-- Alibaba Cloud boundary -->
  <rect x="270" y="90" width="740" height="600" rx="14" fill="none" stroke="#ff6a00" stroke-width="1.5" stroke-dasharray="6 5"/>
  <text x="290" y="114" fill="#ff6a00" font-size="13" font-weight="700">Alibaba Cloud</text>

  <!-- Left column: Ingestion inputs -->
  <rect x="30" y="140" width="200" height="220" rx="10" fill="#11151d" stroke="#232a37"/>
  <text x="130" y="166" fill="#e7ebf2" font-size="13" font-weight="700" text-anchor="middle">Ingestion sources</text>
  <rect x="45" y="180" width="170" height="42" rx="6" fill="#161b25" stroke="#232a37"/>
  <text x="130" y="199" fill="#e7ebf2" font-size="11" text-anchor="middle">POST /api/events</text>
  <text x="130" y="213" fill="#8b94a7" font-size="10" text-anchor="middle">structured or raw text</text>
  <rect x="45" y="230" width="170" height="42" rx="6" fill="#161b25" stroke="#232a37"/>
  <text x="130" y="249" fill="#e7ebf2" font-size="11" text-anchor="middle">Markdown vault ingester</text>
  <text x="130" y="263" fill="#8b94a7" font-size="10" text-anchor="middle">Obsidian, Bear, plain .md</text>
  <rect x="45" y="280" width="170" height="42" rx="6" fill="#161b25" stroke="#232a37"/>
  <text x="130" y="299" fill="#e7ebf2" font-size="11" text-anchor="middle">.ics calendar importer</text>
  <text x="130" y="313" fill="#8b94a7" font-size="10" text-anchor="middle">Google Calendar exports</text>
  <text x="130" y="342" fill="#8b94a7" font-size="10" text-anchor="middle">→ chat / note / calendar events</text>

  <!-- Dashboard -->
  <rect x="30" y="380" width="200" height="180" rx="10" fill="#11151d" stroke="#232a37"/>
  <text x="130" y="406" fill="#e7ebf2" font-size="13" font-weight="700" text-anchor="middle">Dashboard</text>
  <text x="130" y="424" fill="#8b94a7" font-size="10" text-anchor="middle">Next.js + Recharts</text>
  <text x="130" y="446" fill="#8b94a7" font-size="10" text-anchor="middle">accuracy curve · act rate</text>
  <text x="130" y="462" fill="#8b94a7" font-size="10" text-anchor="middle">LongMemEval vs RAG chart</text>
  <text x="130" y="478" fill="#8b94a7" font-size="10" text-anchor="middle">memory browser · auditor</text>
  <text x="130" y="494" fill="#8b94a7" font-size="10" text-anchor="middle">fast-path counter tile</text>
  <text x="130" y="514" fill="#60a5fa" font-size="10" text-anchor="middle">live SSE notifications</text>
  <text x="130" y="536" fill="#a78bfa" font-size="10" text-anchor="middle">side-by-side ask panel</text>

  <!-- ECS box -->
  <rect x="300" y="140" width="440" height="420" rx="12" fill="#10141b" stroke="#33405a"/>
  <text x="320" y="166" fill="#e7ebf2" font-size="13" font-weight="700">FastAPI backend</text>
  <text x="560" y="166" fill="#8b94a7" font-size="11">Elastic Compute Service (ECS), Docker</text>

  <!-- Fast path -->
  <rect x="320" y="185" width="230" height="290" rx="10" fill="#11151d" stroke="#10b981"/>
  <text x="435" y="209" fill="#10b981" font-size="12" font-weight="700" text-anchor="middle">FAST PATH · deterministic · ~99%</text>
  <rect x="335" y="222" width="200" height="34" rx="6" fill="#161b25" stroke="#232a37"/>
  <text x="435" y="243" fill="#e7ebf2" font-size="11" text-anchor="middle">1 · Episodic — events + provenance</text>
  <rect x="335" y="262" width="200" height="34" rx="6" fill="#161b25" stroke="#232a37"/>
  <text x="435" y="283" fill="#e7ebf2" font-size="11" text-anchor="middle">2 · Semantic — merge + corroborate</text>
  <rect x="335" y="302" width="200" height="34" rx="6" fill="#161b25" stroke="#232a37"/>
  <text x="435" y="323" fill="#e7ebf2" font-size="11" text-anchor="middle">3 · Pattern — 4 detectors, evidence-gated</text>
  <rect x="335" y="342" width="200" height="34" rx="6" fill="#161b25" stroke="#232a37"/>
  <text x="435" y="363" fill="#e7ebf2" font-size="11" text-anchor="middle">4 · Decay — half-life by sources</text>
  <rect x="335" y="386" width="200" height="38" rx="6" fill="#1a1420" stroke="#f87171"/>
  <text x="435" y="402" fill="#f87171" font-size="11" font-weight="700" text-anchor="middle">Evidence Auditor</text>
  <text x="435" y="416" fill="#8b94a7" font-size="10" text-anchor="middle">contradictions · noise vs change</text>
  <rect x="335" y="430" width="200" height="34" rx="6" fill="#161b25" stroke="#232a37"/>
  <text x="435" y="446" fill="#e7ebf2" font-size="11" text-anchor="middle">Verifier + confidence gates</text>
  <text x="435" y="459" fill="#8b94a7" font-size="10" text-anchor="middle">act ≥ .80 · show ≥ .40 · else ask</text>

  <!-- Slow path -->
  <rect x="570" y="185" width="150" height="290" rx="10" fill="#11151d" stroke="#a78bfa"/>
  <text x="645" y="209" fill="#a78bfa" font-size="12" font-weight="700" text-anchor="middle">SLOW PATH · Qwen</text>
  <text x="645" y="224" fill="#8b94a7" font-size="10" text-anchor="middle">only when reasoning is needed</text>
  <text x="645" y="252" fill="#e7ebf2" font-size="11" text-anchor="middle">assertion extraction</text>
  <text x="645" y="272" fill="#e7ebf2" font-size="11" text-anchor="middle">question → key mapping</text>
  <text x="645" y="292" fill="#e7ebf2" font-size="11" text-anchor="middle">sourced natural answers</text>
  <text x="645" y="312" fill="#e7ebf2" font-size="11" text-anchor="middle">pattern wording</text>
  <rect x="580" y="322" width="130" height="52" rx="6" fill="#1a1727" stroke="#a78bfa"/>
  <text x="645" y="340" fill="#a78bfa" font-size="11" font-weight="700" text-anchor="middle">Hybrid retrieval</text>
  <text x="645" y="356" fill="#8b94a7" font-size="10" text-anchor="middle">embed → top-k events</text>
  <text x="645" y="370" fill="#8b94a7" font-size="10" text-anchor="middle">cited fallback (no key)</text>
  <line x1="585" y1="386" x2="705" y2="386" stroke="#232a37"/>
  <text x="645" y="404" fill="#fbbf24" font-size="10" font-weight="700" text-anchor="middle">fallback chain</text>
  <text x="645" y="420" fill="#8b94a7" font-size="10" text-anchor="middle">qwen-plus</text>
  <text x="645" y="434" fill="#8b94a7" font-size="10" text-anchor="middle">↓ qwen-turbo</text>
  <text x="645" y="448" fill="#8b94a7" font-size="10" text-anchor="middle">↓ rules-only</text>
  <text x="645" y="464" fill="#8b94a7" font-size="9" text-anchor="middle">(never invents; defers)</text>

  <!-- Model Studio -->
  <rect x="770" y="185" width="215" height="130" rx="10" fill="#11151d" stroke="#ff6a00"/>
  <text x="877" y="212" fill="#e7ebf2" font-size="13" font-weight="600" text-anchor="middle">Model Studio</text>
  <text x="877" y="232" fill="#8b94a7" font-size="11" text-anchor="middle">DashScope OpenAI-</text>
  <text x="877" y="246" fill="#8b94a7" font-size="11" text-anchor="middle">compatible endpoint</text>
  <text x="877" y="272" fill="#a78bfa" font-size="11" text-anchor="middle">qwen-plus · qwen-turbo</text>
  <text x="877" y="290" fill="#a78bfa" font-size="11" text-anchor="middle">text-embedding-v3</text>

  <!-- RDS -->
  <rect x="770" y="335" width="215" height="140" rx="10" fill="#11151d" stroke="#60a5fa"/>
  <text x="877" y="360" fill="#e7ebf2" font-size="13" font-weight="600" text-anchor="middle">ApsaraDB RDS</text>
  <text x="877" y="378" fill="#8b94a7" font-size="11" text-anchor="middle">PostgreSQL + pgvector</text>
  <text x="877" y="404" fill="#8b94a7" font-size="10" text-anchor="middle">events · facts · patterns</text>
  <text x="877" y="418" fill="#8b94a7" font-size="10" text-anchor="middle">contradictions · audit_log</text>
  <text x="877" y="432" fill="#8b94a7" font-size="10" text-anchor="middle">eval_runs</text>
  <text x="877" y="454" fill="#8b94a7" font-size="10" text-anchor="middle">event embeddings for hybrid</text>

  <!-- Observability box -->
  <rect x="770" y="490" width="215" height="70" rx="10" fill="#11151d" stroke="#10b981"/>
  <text x="877" y="512" fill="#10b981" font-size="12" font-weight="700" text-anchor="middle">Observability</text>
  <text x="877" y="530" fill="#8b94a7" font-size="10" text-anchor="middle">SlowPathCounter · fast-path %</text>
  <text x="877" y="546" fill="#8b94a7" font-size="10" text-anchor="middle">est. tokens · qwen calls by model</text>

  <!-- Eval harness -->
  <rect x="300" y="580" width="440" height="90" rx="10" fill="#11151d" stroke="#fbbf24"/>
  <text x="520" y="606" fill="#fbbf24" font-size="12" font-weight="700" text-anchor="middle">Eval harness — seeded, deterministic, zero-LLM</text>
  <text x="520" y="624" fill="#8b94a7" font-size="11" text-anchor="middle">12 tasks × 20 sessions vs last-wins baseline → accuracy curve</text>
  <text x="520" y="644" fill="#8b94a7" font-size="11" text-anchor="middle">LongMemEval (ICLR 2025) vs vanilla RAG — same Qwen models, same data</text>
  <text x="520" y="660" fill="#10b981" font-size="10" font-weight="600" text-anchor="middle">Wins: knowledge-update +20 pts · multi-session +10 pts</text>

  <!-- Arrows -->
  <line x1="230" y1="240" x2="300" y2="240" stroke="#8b94a7" stroke-width="1.5" marker-end="url(#arrow)"/>
  <text x="265" y="232" fill="#8b94a7" font-size="10" text-anchor="middle">ingest</text>
  <line x1="230" y1="440" x2="300" y2="440" stroke="#8b94a7" stroke-width="1.5" marker-end="url(#arrow)"/>
  <text x="265" y="432" fill="#8b94a7" font-size="10" text-anchor="middle">HTTP · ask</text>
  <line x1="300" y1="470" x2="230" y2="470" stroke="#10b981" stroke-width="1.5" marker-end="url(#arrowg)"/>
  <text x="265" y="488" fill="#10b981" font-size="10" text-anchor="middle">SSE</text>
  <line x1="720" y1="245" x2="770" y2="245" stroke="#a78bfa" stroke-width="1.5" marker-end="url(#arrowp)"/>
  <line x1="720" y1="400" x2="770" y2="400" stroke="#8b94a7" stroke-width="1.5" marker-end="url(#arrow)"/>
  <line x1="720" y1="510" x2="770" y2="510" stroke="#10b981" stroke-width="1.5" marker-end="url(#arrowg)"/>
  <line x1="520" y1="560" x2="520" y2="580" stroke="#8b94a7" stroke-width="1.5" marker-end="url(#arrow)"/>
</svg>
