name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  backend:
    name: backend — ruff + pytest + eval reproducibility
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
          cache-dependency-path: backend/pyproject.toml

      - name: Install backend
        run: pip install -e "./backend[dev]"

      - name: Lint (ruff)
        run: ruff check backend

      - name: Unit + API tests (pure logic, no DB)
        run: pytest backend/tests -q

      - name: Reproduce the 20-session accuracy curve
        working-directory: backend
        run: python -m evals.run_eval --sessions 20 --seed 42

  frontend:
    name: frontend — build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install
        working-directory: frontend
        run: npm ci

      - name: Build
        working-directory: frontend
        run: npm run build
